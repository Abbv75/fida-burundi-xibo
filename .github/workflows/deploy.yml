name: Build and Deploy via FTP

on:
  push:
    branches:
      - server-push

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        env:
          VITE_PIPARVB_URL: ${{ secrets.VITE_PIPARVB_URL }}
          VITE_PRODER_URL: ${{ secrets.VITE_PRODER_URL }}
          VITE_PAIFARB_URL: ${{ secrets.VITE_PAIFARB_URL }}

      - name: Upload build folder via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./build/
          server-dir: /
          protocol: ftp
